<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Job Tracker</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body class="bg-light">

<div class="container">

```
<div class="row justify-content-center align-items-center vh-100">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-5">

                <h1 class="text-center mb-4">
                    🚀 Job Tracker
                </h1>

                <h4 class="text-center text-muted mb-4">
                    Create Account
                </h4>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Register

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Already have an account?

                    <a href="/login">
                        Login Here
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
