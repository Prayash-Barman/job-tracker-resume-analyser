<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<h2>Add Job Application</h2>

<form method="POST">

    <input type="text"
           name="company"
           placeholder="Company"
           required>

    <br><br>

    <input type="text"
           name="role"
           placeholder="Role"
           required>

    <br><br>

    <select name="status">

        <option>Applied</option>
        <option>OA</option>
        <option>Interview</option>
        <option>Rejected</option>
        <option>Offer</option>

    </select>

    <br><br>

    <input type="date" name="date">

    <br><br>

    <button type="submit">
        Save Job
    </button>

</form>

<a href="/dashboard">
    Back
</a>

</body>
</html>
